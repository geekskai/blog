<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陈成连，我喜欢你</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Ma Shan Zheng', cursive;
    cursor: none;
  }

  #cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle, #ff69b4, #ff1493);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 9999;
    transition: transform 0.1s;
    box-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
  }

  canvas { position: fixed; top: 0; left: 0; }

  #scene {
    position: fixed;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    perspective: 1000px;
  }

  #card {
    position: relative;
    width: 520px;
    max-width: 90vw;
    padding: 60px 50px;
    background: linear-gradient(135deg, rgba(20,0,30,0.85) 0%, rgba(60,0,50,0.85) 100%);
    border: 1px solid rgba(255,105,180,0.4);
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow:
      0 0 60px rgba(255,20,147,0.3),
      0 0 120px rgba(255,20,147,0.1),
      inset 0 0 60px rgba(255,20,147,0.05);
    transform-style: preserve-3d;
    animation: floatCard 6s ease-in-out infinite;
    opacity: 0;
    transition: opacity 1s;
  }

  #card.visible { opacity: 1; }

  @keyframes floatCard {
    0%, 100% { transform: translateY(0px) rotateX(2deg); }
    50% { transform: translateY(-20px) rotateX(-2deg); }
  }

  .corner-deco {
    position: absolute;
    width: 40px; height: 40px;
    border-color: #ff69b4;
    border-style: solid;
    opacity: 0.7;
  }
  .corner-deco.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 6px 0 0 0; }
  .corner-deco.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 6px 0 0; }
  .corner-deco.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 6px; }
  .corner-deco.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 6px 0; }

  .name-title {
    font-size: 3.2em;
    color: #fff;
    text-shadow:
      0 0 20px #ff69b4,
      0 0 40px #ff1493,
      0 0 80px #ff69b4;
    letter-spacing: 0.15em;
    margin-bottom: 10px;
    animation: glowPulse 2s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493, 0 0 80px #ff69b4; }
    50% { text-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493, 0 0 120px #ff69b4, 0 0 200px #ff1493; }
  }

  .subtitle {
    font-size: 1.1em;
    color: rgba(255,182,193,0.7);
    letter-spacing: 0.3em;
    margin-bottom: 40px;
    font-family: 'Noto Serif SC', serif;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #ff69b4, transparent);
    margin: 25px 0;
    position: relative;
    overflow: visible;
  }

  .divider::after {
    content: '❤';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #ff69b4;
    font-size: 1.2em;
    background: rgba(20,0,30,0.9);
    padding: 0 12px;
    animation: heartBeat 1.2s ease-in-out infinite;
  }

  @keyframes heartBeat {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.3); }
  }

  .message {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.05em;
    color: rgba(255,220,230,0.9);
    line-height: 2.2;
    letter-spacing: 0.08em;
    margin: 20px 0;
  }

  .highlight {
    color: #ff69b4;
    text-shadow: 0 0 10px #ff69b4;
    font-weight: 700;
  }

  .confession-text {
    font-size: 1.8em;
    color: #fff;
    text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
    margin: 30px 0 20px;
    letter-spacing: 0.2em;
    animation: glowPulse 2s ease-in-out infinite;
  }

  .btn {
    display: inline-block;
    margin-top: 30px;
    padding: 14px 40px;
    background: linear-gradient(135deg, #ff1493, #ff69b4);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 1.1em;
    font-family: 'Ma Shan Zheng', cursive;
    letter-spacing: 0.15em;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(255,20,147,0.5);
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
  }

  .btn:hover::before { left: 100%; }
  .btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 50px rgba(255,20,147,0.8);
  }

  #particles-canvas { z-index: 1; }
  #fireworks-canvas { z-index: 2; }

  /* Floating petals */
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    font-size: 1.2em;
    animation: petalFall linear infinite;
    opacity: 0.8;
  }

  @keyframes petalFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Stars bg */
  .star {
    position: fixed;
    background: #fff;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
    z-index: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="particles-canvas"></canvas>
<canvas id="fireworks-canvas"></canvas>

<div id="scene">
  <div id="card">
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>

    <div class="name-title">陈成连</div>
    <div class="subtitle">— 致那个让我心动的你 —</div>

    <div class="divider"></div>

    <div class="message">
      遇见你，是我这辈子<br>
      最美好的事情之一。<br>
      你的笑容，是我每天<br>
      最期待的风景。
    </div>

    <div class="divider"></div>

    <div class="confession-text">我喜欢你 ❤</div>

    <div class="message">
      喜欢你说话的样子，<br>
      喜欢你认真的眼神，<br>
      喜欢每一个<span class="highlight">有你在</span>的瞬间。<br>
      愿意陪你走过以后的每一天。
    </div>

    <button class="btn" onclick="triggerBigFireworks()">点击放烟花 ✨</button>
  </div>
</div>

<script>
// ---- Cursor ----
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// ---- Stars ----
for (let i = 0; i < 120; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  const size = Math.random() * 3 + 1;
  star.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    animation-duration:${Math.random()*3+2}s;
    animation-delay:${Math.random()*3}s;
  `;
  document.body.appendChild(star);
}

// ---- Floating petals/hearts ----
const symbols = ['🌸', '💕', '✨', '💖', '🌺', '💗', '⭐'];
function createPetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (Math.random() * 8 + 6) + 's';
  p.style.animationDelay = (Math.random() * 5) + 's';
  p.style.fontSize = (Math.random() * 0.8 + 0.7) + 'em';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 14000);
}
setInterval(createPetal, 600);

// ---- Fireworks ----
const fwCanvas = document.getElementById('fireworks-canvas');
const fwCtx = fwCanvas.getContext('2d');
fwCanvas.width = window.innerWidth;
fwCanvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
});

const particles = [];
const colors = [
  '#ff69b4','#ff1493','#ff6eb4','#ffb6c1',
  '#fff0f5','#ffd700','#ff4500','#00ced1',
  '#9400d3','#00ff7f','#1e90ff','#ff8c00'
];

class Particle {
  constructor(x, y, color, angle, speed, type = 'spark') {
    this.x = x; this.y = y;
    this.color = color;
    this.alpha = 1;
    this.type = type;
    if (type === 'rocket') {
      this.vx = 0;
      this.vy = -speed;
      this.radius = 3;
    } else {
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.radius = Math.random() * 3 + 1;
    }
    this.gravity = 0.08;
    this.decay = Math.random() * 0.015 + 0.008;
    this.trail = [];
  }

  update() {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 8) this.trail.shift();
    this.vx *= 0.98;
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.alpha -= this.decay;
  }

  draw(ctx) {
    ctx.save();
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const a = (i / this.trail.length) * this.alpha * 0.4;
      ctx.globalAlpha = a;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.radius * (i / this.trail.length), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = this.alpha;
    ctx.shadowBlur = 15;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  isDead() { return this.alpha <= 0; }
}

class Rocket {
  constructor(x, targetY) {
    this.x = x;
    this.y = fwCanvas.height + 10;
    this.targetY = targetY;
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.vy = -18 - Math.random() * 6;
    this.alpha = 1;
    this.trail = [];
    this.exploded = false;
  }

  update() {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 12) this.trail.shift();
    this.vy += 0.3;
    this.y += this.vy;
    if (this.y <= this.targetY) this.explode();
  }

  explode() {
    this.exploded = true;
    const count = 120 + Math.floor(Math.random() * 60);
    const c1 = colors[Math.floor(Math.random() * colors.length)];
    const c2 = colors[Math.floor(Math.random() * colors.length)];
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i;
      const speed = Math.random() * 7 + 2;
      const color = Math.random() > 0.5 ? c1 : c2;
      particles.push(new Particle(this.x, this.y, color, angle, speed));
    }
    // Extra sparkles
    for (let i = 0; i < 30; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 3 + 1;
      particles.push(new Particle(this.x, this.y, '#fff', angle, speed));
    }
  }

  draw(ctx) {
    for (let i = 0; i < this.trail.length; i++) {
      const a = (i / this.trail.length) * 0.6;
      ctx.globalAlpha = a;
      ctx.fillStyle = this.color;
      ctx.shadowBlur = 10;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 20;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

const rockets = [];
let frameCount = 0;

function launchRocket() {
  const x = Math.random() * fwCanvas.width * 0.8 + fwCanvas.width * 0.1;
  const targetY = Math.random() * fwCanvas.height * 0.5 + 50;
  rockets.push(new Rocket(x, targetY));
}

function triggerBigFireworks() {
  for (let i = 0; i < 8; i++) {
    setTimeout(() => launchRocket(), i * 200);
  }
}

function fwLoop() {
  fwCtx.fillStyle = 'rgba(0,0,0,0.15)';
  fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);

  frameCount++;
  if (frameCount % 80 === 0) launchRocket();

  for (let i = rockets.length - 1; i >= 0; i--) {
    rockets[i].update();
    if (!rockets[i].exploded) rockets[i].draw(fwCtx);
    else rockets.splice(i, 1);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw(fwCtx);
    if (particles[i].isDead()) particles.splice(i, 1);
  }

  requestAnimationFrame(fwLoop);
}

// ---- Particle bg canvas ----
const pCanvas = document.getElementById('particles-canvas');
const pCtx = pCanvas.getContext('2d');
pCanvas.width = window.innerWidth;
pCanvas.height = window.innerHeight;

const bgParticles = [];
for (let i = 0; i < 80; i++) {
  bgParticles.push({
    x: Math.random() * pCanvas.width,
    y: Math.random() * pCanvas.height,
    r: Math.random() * 2 + 0.5,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    color: `hsl(${320 + Math.random()*60},100%,${60 + Math.random()*30}%)`,
    alpha: Math.random() * 0.5 + 0.2
  });
}

function bgLoop() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  for (const p of bgParticles) {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = pCanvas.width;
    if (p.x > pCanvas.width) p.x = 0;
    if (p.y < 0) p.y = pCanvas.height;
    if (p.y > pCanvas.height) p.y = 0;
    pCtx.globalAlpha = p.alpha;
    pCtx.fillStyle = p.color;
    pCtx.shadowBlur = 8;
    pCtx.shadowColor = p.color;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pCtx.fill();
  }
  pCtx.globalAlpha = 1;
  pCtx.shadowBlur = 0;

  // Connect nearby particles
  for (let i = 0; i < bgParticles.length; i++) {
    for (let j = i + 1; j < bgParticles.length; j++) {
      const dx = bgParticles[i].x - bgParticles[j].x;
      const dy = bgParticles[i].y - bgParticles[j].y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < 100) {
        pCtx.globalAlpha = (1 - dist/100) * 0.15;
        pCtx.strokeStyle = '#ff69b4';
        pCtx.lineWidth = 0.5;
        pCtx.beginPath();
        pCtx.moveTo(bgParticles[i].x, bgParticles[i].y);
        pCtx.lineTo(bgParticles[j].x, bgParticles[j].y);
        pCtx.stroke();
      }
    }
  }
  pCtx.globalAlpha = 1;
  requestAnimationFrame(bgLoop);
}

// ---- 3D card tilt on mouse ----
const card = document.getElementById('card');
document.addEventListener('mousemove', e => {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const rx = (e.clientY - cy) / cy * -10;
  const ry = (e.clientX - cx) / cx * 10;
  card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) translateY(-10px)`;
});
document.addEventListener('mouseleave', () => {
  card.style.transform = '';
});

// Init
fwLoop();
bgLoop();

// Show card
setTimeout(() => {
  card.classList.add('visible');
  launchRocket();
  setTimeout(launchRocket, 400);
  setTimeout(launchRocket, 800);
}, 500);
</script>
</body>
</html>
